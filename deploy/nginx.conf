# Nginx-конфиг для ostensacken.com (статика из public/)
# Путь на сервере: /etc/nginx/sites-available/ostensacken.com
# Клон репозитория ожидается в: /var/www/ostensacken

server {
    listen 80;
    listen [::]:80;

    server_name ostensacken.com www.ostensacken.com;

    root /var/www/ostensacken/public;
    index index.html;

    # Основной роутинг статики
    location / {
        try_files $uri $uri/ =404;
    }

    # Кэш статических ассетов
    location ~* \.(?:css|js|png|jpe?g|gif|svg|ico|webp|woff2?|ttf|otf|mp4)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Разрешаем крупные видео-ответы без буферных предупреждений
    client_max_body_size 100m;
}
