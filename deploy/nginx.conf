# Nginx-конфіг для ostensacken.com
# Статику віддає nginx (public/), а /api/ проксіює на Node (server.js, порт 3000).
# Шлях на сервері: /etc/nginx/sites-available/ostensacken.com
# Клон репозиторію: /var/www/ostensacken

server {
    listen 80;
    listen [::]:80;

    server_name ostensacken.com www.ostensacken.com;

    root /var/www/ostensacken/public;
    index index.html;

    # Дозволяємо завантаження фото в адмінку (base64 ~ до 10 МБ)
    client_max_body_size 12m;

    # ---- Security headers (для HTML/статики, яку віддає nginx) ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    # HSTS (діє лише коли блок обслуговує 443/HTTPS — після Certbot). Браузер запам'ятовує
    # HTTPS на рік → захист від downgrade/SSL-strip. На чистому http-блоці ігнорується браузером.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API → Node (Express через PM2)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика
    location / {
        try_files $uri $uri/ =404;
    }

    # Кеш статичних ассетів
    location ~* \.(?:css|js|png|jpe?g|gif|svg|ico|webp|woff2?|ttf|otf|mp4)$ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;
}
